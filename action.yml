name: "secheaders"
description: "Scan a URL for HTTP security headers, score it, and gate CI on the result."
author: "Pablo"
branding:
  icon: "shield"
  color: "green"

inputs:
  url:
    description: "Target URL to scan (mutually exclusive with input-file)."
    required: false
  input-file:
    description: "Path to a file with one URL per line (batch mode)."
    required: false
  fail-under:
    description: "Fail the step if any score is below this value (0-100)."
    required: false
  format:
    description: "Output format: terminal, json, html, or csv."
    required: false
    default: "terminal"
  output:
    description: "Write the report to this file instead of stdout."
    required: false
  version:
    description: "Version of secheaders to install (PyPI spec, e.g. '0.1.0')."
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Install secheaders
      shell: bash
      run: |
        if [ -n "${{ inputs.version }}" ]; then
          pip install "secheaders==${{ inputs.version }}"
        else
          pip install secheaders
        fi

    - name: Run secheaders
      shell: bash
      run: |
        args=()
        [ -n "${{ inputs.url }}" ] && args+=("${{ inputs.url }}")
        [ -n "${{ inputs.input-file }}" ] && args+=(--input "${{ inputs.input-file }}")
        [ -n "${{ inputs.fail-under }}" ] && args+=(--fail-under "${{ inputs.fail-under }}")
        [ -n "${{ inputs.output }}" ] && args+=(--output "${{ inputs.output }}")
        args+=(--format "${{ inputs.format }}")
        secheaders "${args[@]}"
